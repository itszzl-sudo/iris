# Cargo 配置 - 使用清华大学镜像源
# 将此文件放在项目根目录的 .cargo/ 文件夹中

# 使用清华大学 crates.io 镜像
[source.crates-io]
replace-with = 'tuna'

# 清华大学镜像源
[source.tuna]
registry = "https://mirrors.tuna.tsinghua.edu.cn/git/crates.io-index.git"

# 可选：同时配置其他镜像源（如果需要）
# [source.ustc]
# registry = "https://mirrors.ustc.edu.cn/crates.io-index"

# [source.rustcc]
# registry = "sparse+https://crates.rustcc.cn"

# 配置二进制文件下载镜像（可选）
# 用于 rustup 和 cargo install 的二进制文件下载
# [net]
# retry = 3
