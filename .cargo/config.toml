# Cargo 性能优化配置
# 配置位置：项目根目录 .cargo/config.toml

# ============================================
# 1. 镜像源配置 - 使用清华大学 TUNA 镜像
# ============================================

# 使用清华大学 crates.io 镜像
[source.crates-io]
replace-with = 'tuna'

# 清华大学镜像源（git 协议，速度快）
[source.tuna]
registry = "https://mirrors.tuna.tsinghua.edu.cn/git/crates.io-index.git"

# ============================================
# 2. 网络优化 - 加速下载
# ============================================

[net]
# 并行下载数量（默认 4，增加到 8）
retry = 3
# 注意：sparse-registry 需要在 Cargo 1.68+ 中使用
# 如果使用 git 协议的镜像源，此选项无效

# ============================================
# 3. 编译优化 - 加速编译
# ============================================

[build]
# 并行编译任务数（默认使用 CPU 核心数）
# 可以设置为具体数字，如 jobs = 8
# jobs = 8

# 显示详细的编译进度（更友好的输出）
# target = "x86_64-pc-windows-msvc"

# ============================================
# 4. Cargo 缓存优化
# ============================================

[cargo]
# 使用 sparse 协议（Rust 1.68+ 支持，速度更快）
# 会自动从 git 协议切换到 https 协议

# ============================================
# 5. 调试符号优化（减小二进制大小）
# ============================================

# [profile.dev]
# 开发模式下也优化编译速度（默认已优化）
# opt-level = 0
# debug = false  # 不生成调试符号（加快编译，减小体积）

# [profile.release]
# 发布模式优化
# opt-level = 3
# lto = true           # 链接时优化（减小体积，增加编译时间）
# codegen-units = 1    # 减少代码生成单元（优化更好，但编译更慢）
# strip = true         # 移除调试符号（减小体积）

# ============================================
# 6. 目标目录优化（减少磁盘 IO）
# ============================================

# [build]
# 将 target 目录设置到更快的磁盘（如 SSD）
# target-dir = "D:/cargo-target/iris"

# ============================================
# 7. 环境变量优化（可选）
# ============================================

# 在 PowerShell 中设置：
# $env:CARGO_BUILD_JOBS = "8"  # 并行编译数
# $env:CARGO_NET_RETRY = "3"   # 重试次数
